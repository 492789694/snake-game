<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#101412">
  <title>果冻消消乐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">MATCH CLUB / 今日挑战</p>
        <h1>果冻消消乐</h1>
      </div>
      <button id="soundButton" class="pill-button" type="button">音效 开</button>
    </header>

    <section class="mission" aria-label="关卡目标">
      <div class="level-badge"><span>关卡</span><strong>01</strong></div>
      <div class="mission-copy">
        <span>本局目标</span>
        <strong>获得 <b id="targetScore">3000</b> 分</strong>
        <div class="progress"><i id="progressBar"></i></div>
      </div>
    </section>

    <section class="stats" aria-label="游戏数据">
      <div><span>得分</span><strong id="score">0000</strong></div>
      <div><span>剩余步数</span><strong id="moves">25</strong></div>
      <div><span>最高分</span><strong id="best">0000</strong></div>
    </section>

    <section id="boardWrap" class="board-wrap">
      <canvas id="game" width="640" height="640" aria-label="消消乐游戏棋盘"></canvas>
      <div id="combo" class="combo" aria-live="polite"></div>
      <div id="overlay" class="overlay">
        <p id="overlayTag" class="eyebrow">轻松一下</p>
        <h2 id="overlayTitle">点击开始消除</h2>
        <p id="overlayText">依次点击两个相邻果冻，凑出三个或更多同色果冻。</p>
        <button id="startButton" class="primary-button" type="button">开始游戏</button>
      </div>
    </section>

    <div class="actions">
      <button id="hintButton" type="button">提示</button>
      <button id="shuffleButton" type="button">重排</button>
      <button id="restartButton" type="button">重新开始</button>
    </div>
    <p class="tip">点击两个相邻果冻进行交换</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
